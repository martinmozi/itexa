<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 720" font-size="13">
  <style>
    .bg{ fill:#ffffff; }
    .txt{ fill:#1f2937; font-family:'Segoe UI',Helvetica,Arial,sans-serif; }
    .muted{ fill:#6b7280; font-family:'Segoe UI',Helvetica,Arial,sans-serif; }
    .stack{ fill:none; stroke:#94a3b8; stroke-width:2; stroke-dasharray:6 5; }
    .attn{ fill:#fee2e2; stroke:#dc2626; stroke-width:2; }
    .attnt{ fill:#991b1b; font-family:'Segoe UI',Helvetica,Arial,sans-serif; font-weight:600; }
    .norm{ fill:#fef3c7; stroke:#d97706; stroke-width:2; }
    .normt{ fill:#92400e; font-family:'Segoe UI',Helvetica,Arial,sans-serif; }
    .ff{ fill:#eff6ff; stroke:#3b82f6; stroke-width:2; }
    .fft{ fill:#1e3a8a; font-family:'Segoe UI',Helvetica,Arial,sans-serif; font-weight:600; }
    .emb{ fill:#dcfce7; stroke:#059669; stroke-width:2; }
    .embt{ fill:#065f46; font-family:'Segoe UI',Helvetica,Arial,sans-serif; font-weight:600; }
    .pos{ fill:#ede9fe; stroke:#7c3aed; stroke-width:2; }
    .post{ fill:#5b21b6; font-family:'Segoe UI',Helvetica,Arial,sans-serif; font-weight:600; }
    .arr{ stroke:#6b7280; stroke-width:2; fill:none; }
    .arrX{ stroke:#dc2626; stroke-width:2; fill:none; stroke-dasharray:5 4; }
    @media (prefers-color-scheme: dark){
      .bg{ fill:#0d1117; } .txt{ fill:#e6edf3; } .muted{ fill:#9ca3af; }
      .stack{ stroke:#475569; }
      .attn{ fill:#3a1414; stroke:#f87171; } .attnt{ fill:#fca5a5; }
      .norm{ fill:#3a2a0d; stroke:#fbbf24; } .normt{ fill:#fbbf24; }
      .ff{ fill:#16233b; stroke:#60a5fa; } .fft{ fill:#93c5fd; }
      .emb{ fill:#0f2e1e; stroke:#34d399; } .embt{ fill:#6ee7b7; }
      .pos{ fill:#231447; stroke:#a78bfa; } .post{ fill:#c4b5fd; }
      .arr{ stroke:#9ca3af; } .arrX{ stroke:#f87171; }
    }
  </style>
  <rect class="bg" x="0" y="0" width="880" height="720" rx="10"/>
  <text class="txt" x="220" y="34" text-anchor="middle" font-size="17" font-weight="700">ENCODER</text>
  <text class="txt" x="640" y="34" text-anchor="middle" font-size="17" font-weight="700">DECODER</text>
  <text class="muted" x="220" y="54" text-anchor="middle" font-size="12">„prečíta" vstup (napr. vetu na preklad)</text>
  <text class="muted" x="640" y="54" text-anchor="middle" font-size="12">generuje výstup token po tokene</text>

  <!-- ===== ENCODER ===== -->
  <rect class="stack" x="70" y="120" width="300" height="360" rx="12"/>
  <text class="muted" x="86" y="140" font-size="12">N×</text>

  <!-- FF + norm (top) -->
  <rect class="norm" x="120" y="150" width="200" height="34" rx="6"/>
  <text class="normt" x="220" y="172" text-anchor="middle">Add &amp; Norm</text>
  <rect class="ff" x="120" y="196" width="200" height="44" rx="6"/>
  <text class="fft" x="220" y="216" text-anchor="middle">Feed Forward</text>
  <text class="muted" x="220" y="232" text-anchor="middle" font-size="11">(MLP na každý token)</text>

  <rect class="norm" x="120" y="300" width="200" height="34" rx="6"/>
  <text class="normt" x="220" y="322" text-anchor="middle">Add &amp; Norm</text>
  <rect class="attn" x="120" y="346" width="200" height="48" rx="6"/>
  <text class="attnt" x="220" y="367" text-anchor="middle">Multi-Head</text>
  <text class="attnt" x="220" y="385" text-anchor="middle">Self-Attention</text>

  <!-- encoder input -->
  <rect class="pos" x="120" y="500" width="200" height="34" rx="6"/>
  <text class="post" x="220" y="522" text-anchor="middle">+ Positional Encoding</text>
  <rect class="emb" x="120" y="546" width="200" height="34" rx="6"/>
  <text class="embt" x="220" y="568" text-anchor="middle">Input Embedding</text>
  <text class="txt" x="220" y="612" text-anchor="middle" font-size="13">„Zajtra bude pekne"</text>
  <text class="muted" x="220" y="630" text-anchor="middle" font-size="11">vstupné tokeny</text>

  <!-- encoder internal arrows -->
  <path class="arr" d="M220,546 L220,534" marker-end="url(#a)"/>
  <path class="arr" d="M220,500 L220,394" marker-end="url(#a)"/>
  <path class="arr" d="M220,346 L220,334" marker-end="url(#a)"/>
  <path class="arr" d="M220,300 L220,240" marker-end="url(#a)"/>
  <path class="arr" d="M220,196 L220,184" marker-end="url(#a)"/>
  <path class="arr" d="M220,150 L220,110 L400,110" marker-end="url(#a)"/>
  <text class="muted" x="300" y="102" font-size="11">výstup encodera → do decodera</text>

  <!-- ===== DECODER ===== -->
  <rect class="stack" x="500" y="120" width="300" height="440" rx="12"/>
  <text class="muted" x="516" y="140" font-size="12">N×</text>

  <!-- FF + norm (top) -->
  <rect class="norm" x="550" y="150" width="200" height="34" rx="6"/>
  <text class="normt" x="650" y="172" text-anchor="middle">Add &amp; Norm</text>
  <rect class="ff" x="550" y="196" width="200" height="40" rx="6"/>
  <text class="fft" x="650" y="221" text-anchor="middle">Feed Forward</text>

  <!-- cross attention -->
  <rect class="norm" x="550" y="272" width="200" height="34" rx="6"/>
  <text class="normt" x="650" y="294" text-anchor="middle">Add &amp; Norm</text>
  <rect class="attn" x="550" y="318" width="200" height="48" rx="6"/>
  <text class="attnt" x="650" y="339" text-anchor="middle">Cross-Attention</text>
  <text class="attnt" x="650" y="357" text-anchor="middle" font-size="11">(pozerá na encoder)</text>

  <!-- masked self attention -->
  <rect class="norm" x="550" y="400" width="200" height="34" rx="6"/>
  <text class="normt" x="650" y="422" text-anchor="middle">Add &amp; Norm</text>
  <rect class="attn" x="550" y="446" width="200" height="48" rx="6"/>
  <text class="attnt" x="650" y="467" text-anchor="middle">Masked Multi-Head</text>
  <text class="attnt" x="650" y="485" text-anchor="middle">Self-Attention</text>

  <!-- decoder input -->
  <rect class="pos" x="550" y="580" width="200" height="34" rx="6"/>
  <text class="post" x="650" y="602" text-anchor="middle">+ Positional Encoding</text>
  <rect class="emb" x="550" y="626" width="200" height="34" rx="6"/>
  <text class="embt" x="650" y="648" text-anchor="middle">Output Embedding</text>
  <text class="muted" x="650" y="682" text-anchor="middle" font-size="11">doteraz vygenerované tokeny (posunuté o 1)</text>

  <!-- decoder arrows -->
  <path class="arr" d="M650,626 L650,614" marker-end="url(#a)"/>
  <path class="arr" d="M650,580 L650,494" marker-end="url(#a)"/>
  <path class="arr" d="M650,446 L650,434" marker-end="url(#a)"/>
  <path class="arr" d="M650,400 L650,366" marker-end="url(#a)"/>
  <path class="arr" d="M650,318 L650,306" marker-end="url(#a)"/>
  <path class="arr" d="M650,272 L650,236" marker-end="url(#a)"/>
  <path class="arr" d="M650,196 L650,184" marker-end="url(#a)"/>
  <!-- encoder->cross attention -->
  <path class="arrX" d="M400,110 L470,110 L470,342 L550,342" marker-end="url(#ax)"/>
  <text class="attnt" x="470" y="330" text-anchor="middle" font-size="10">K,V</text>

  <!-- decoder output head -->
  <path class="arr" d="M650,150 L650,110" marker-end="url(#a)"/>
  <rect class="ff" x="550" y="70" width="200" height="30" rx="6"/>
  <text class="fft" x="650" y="90" text-anchor="middle">Linear → Softmax</text>
  <text class="muted" x="820" y="90" text-anchor="middle" font-size="11" transform="rotate(0)">→ ďalší token</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6b7280"/>
    </marker>
    <marker id="ax" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#dc2626"/>
    </marker>
  </defs>

  <text class="muted" x="440" y="708" text-anchor="middle" font-size="12">Encoder-only (BERT) používa len ľavý stĺpec • Decoder-only (GPT, LLM) používa len pravý stĺpec s maskovanou self-attention.</text>
</svg>
