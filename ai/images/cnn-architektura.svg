<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-size="14">
  <style>
    .bg{ fill:#ffffff; }
    .txt{ fill:#1f2937; font-family:'Segoe UI',Helvetica,Arial,sans-serif; }
    .muted{ fill:#6b7280; font-family:'Segoe UI',Helvetica,Arial,sans-serif; }
    .img{ fill:#e0e7ff; stroke:#6366f1; stroke-width:2; }
    .conv{ fill:#eff6ff; stroke:#3b82f6; stroke-width:2; }
    .pool{ fill:#fef3c7; stroke:#d97706; stroke-width:2; }
    .fc{ fill:#dcfce7; stroke:#059669; stroke-width:2; }
    .fcnode{ fill:#dcfce7; stroke:#059669; stroke-width:2; }
    .arr{ stroke:#6b7280; stroke-width:2.5; fill:none; }
    .lbl{ fill:#3b82f6; font-family:'Segoe UI',Helvetica,Arial,sans-serif; font-weight:600; }
    .lblP{ fill:#d97706; font-family:'Segoe UI',Helvetica,Arial,sans-serif; font-weight:600; }
    .lblF{ fill:#059669; font-family:'Segoe UI',Helvetica,Arial,sans-serif; font-weight:600; }
    @media (prefers-color-scheme: dark){
      .bg{ fill:#0d1117; } .txt{ fill:#e6edf3; } .muted{ fill:#9ca3af; }
      .img{ fill:#1e213f; stroke:#818cf8; }
      .conv{ fill:#16233b; stroke:#60a5fa; } .lbl{ fill:#93c5fd; }
      .pool{ fill:#3a2a0d; stroke:#fbbf24; } .lblP{ fill:#fbbf24; }
      .fc{ fill:#0f2e1e; stroke:#34d399; } .fcnode{ fill:#0f2e1e; stroke:#34d399; } .lblF{ fill:#6ee7b7; }
      .arr{ stroke:#9ca3af; }
    }
  </style>
  <rect class="bg" x="0" y="0" width="900" height="440" rx="10"/>
  <text class="muted" x="450" y="34" text-anchor="middle" font-size="15">Typická CNN: strieda konvolúciu a pooling (extrakcia príznakov), na konci plne prepojené vrstvy (klasifikácia)</text>

  <!-- input image -->
  <rect class="img" x="30" y="150" width="70" height="70" rx="4"/>
  <text class="muted" x="65" y="240" text-anchor="middle" font-size="12">vstup</text>
  <text class="muted" x="65" y="256" text-anchor="middle" font-size="12">28×28</text>

  <path class="arr" d="M104,185 L128,185" marker-end="url(#a)"/>

  <!-- conv1: 3 feature maps -->
  <rect class="conv" x="150" y="130" width="55" height="55" rx="3"/>
  <rect class="conv" x="140" y="140" width="55" height="55" rx="3"/>
  <rect class="conv" x="130" y="150" width="55" height="55" rx="3"/>
  <text class="lbl" x="158" y="230" text-anchor="middle" font-size="12.5">Conv + ReLU</text>
  <text class="muted" x="158" y="246" text-anchor="middle" font-size="11">mapy príznakov</text>

  <path class="arr" d="M200,180 L228,180" marker-end="url(#a)"/>

  <!-- pool1 -->
  <rect class="pool" x="250" y="145" width="42" height="42" rx="3"/>
  <rect class="pool" x="243" y="152" width="42" height="42" rx="3"/>
  <rect class="pool" x="236" y="159" width="42" height="42" rx="3"/>
  <text class="lblP" x="262" y="230" text-anchor="middle" font-size="12.5">Pooling</text>
  <text class="muted" x="262" y="246" text-anchor="middle" font-size="11">zmenší 2×</text>

  <path class="arr" d="M298,180 L326,180" marker-end="url(#a)"/>

  <!-- conv2 -->
  <rect class="conv" x="350" y="150" width="34" height="34" rx="3"/>
  <rect class="conv" x="344" y="156" width="34" height="34" rx="3"/>
  <rect class="conv" x="338" y="162" width="34" height="34" rx="3"/>
  <rect class="conv" x="332" y="168" width="34" height="34" rx="3"/>
  <text class="lbl" x="358" y="230" text-anchor="middle" font-size="12.5">Conv + ReLU</text>
  <text class="muted" x="358" y="246" text-anchor="middle" font-size="11">viac máp</text>

  <path class="arr" d="M388,185 L416,185" marker-end="url(#a)"/>

  <!-- pool2 -->
  <rect class="pool" x="438" y="165" width="24" height="24" rx="3"/>
  <rect class="pool" x="433" y="170" width="24" height="24" rx="3"/>
  <rect class="pool" x="428" y="175" width="24" height="24" rx="3"/>
  <rect class="pool" x="423" y="180" width="24" height="24" rx="3"/>
  <text class="lblP" x="442" y="230" text-anchor="middle" font-size="12.5">Pooling</text>

  <path class="arr" d="M470,185 L500,185" marker-end="url(#a)"/>

  <!-- flatten -->
  <g>
    <rect class="conv" x="512" y="120" width="16" height="140" rx="3"/>
  </g>
  <text class="muted" x="520" y="285" text-anchor="middle" font-size="12">flatten</text>
  <text class="muted" x="520" y="300" text-anchor="middle" font-size="11">→ 1D vektor</text>

  <path class="arr" d="M534,185 L566,185" marker-end="url(#a)"/>

  <!-- FC layers -->
  <g>
    <circle class="fcnode" cx="600" cy="140" r="11"/>
    <circle class="fcnode" cx="600" cy="175" r="11"/>
    <circle class="fcnode" cx="600" cy="210" r="11"/>
    <circle class="fcnode" cx="600" cy="245" r="11"/>
    <circle class="fcnode" cx="660" cy="160" r="11"/>
    <circle class="fcnode" cx="660" cy="195" r="11"/>
    <circle class="fcnode" cx="660" cy="230" r="11"/>
  </g>
  <line class="arr" x1="611" y1="140" x2="649" y2="160" stroke-width="1" opacity="0.5"/>
  <line class="arr" x1="611" y1="175" x2="649" y2="195" stroke-width="1" opacity="0.5"/>
  <line class="arr" x1="611" y1="210" x2="649" y2="230" stroke-width="1" opacity="0.5"/>
  <line class="arr" x1="611" y1="245" x2="649" y2="195" stroke-width="1" opacity="0.5"/>
  <line class="arr" x1="611" y1="140" x2="649" y2="230" stroke-width="1" opacity="0.5"/>
  <text class="lblF" x="630" y="290" text-anchor="middle" font-size="12.5">Plne prepojené</text>
  <text class="muted" x="630" y="306" text-anchor="middle" font-size="11">(feed-forward)</text>

  <path class="arr" d="M672,195 L706,195" marker-end="url(#a)"/>

  <!-- output softmax -->
  <g>
    <rect class="fc" x="720" y="120" width="140" height="26" rx="4"/><text class="txt" x="728" y="138" font-size="12">mačka  0.86</text>
    <rect class="fc" x="720" y="152" width="140" height="26" rx="4"/><text class="txt" x="728" y="170" font-size="12">pes    0.09</text>
    <rect class="fc" x="720" y="184" width="140" height="26" rx="4"/><text class="txt" x="728" y="202" font-size="12">auto   0.03</text>
    <rect class="fc" x="720" y="216" width="140" height="26" rx="4"/><text class="txt" x="728" y="234" font-size="12">iné    0.02</text>
  </g>
  <text class="lblF" x="790" y="262" text-anchor="middle" font-size="12.5">Softmax výstup</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#6b7280"/>
    </marker>
  </defs>

  <text class="muted" x="300" y="360" text-anchor="middle" font-size="13">Extrakcia príznakov (konvolúcia + pooling) — hľadá hrany → tvary → objekty</text>
  <text class="muted" x="720" y="360" text-anchor="middle" font-size="13">Klasifikácia (FC + softmax)</text>
  <line x1="20" y1="375" x2="880" y2="375" class="arr" stroke-dasharray="4 4" opacity="0.4"/>
  <text class="muted" x="450" y="405" text-anchor="middle" font-size="12.5">Hĺbkou siete rastie abstrakcia: prvé vrstvy = hrany a farby, hlbšie = časti objektov, posledné = celé objekty.</text>
</svg>
